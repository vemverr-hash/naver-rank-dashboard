name: Naver Rank Scraper (30m)

on:
  schedule:
    # 30분마다 실행하는 마법의 주문입니다.
    - cron: '*/30 * * * *'
  workflow_dispatch: # 수동으로 바로 실행할 수 있는 버튼 추가!

jobs:
  scrape-and-save:
    runs-on: ubuntu-latest
    steps:
      - name: 📂 소스코드 가져오기
        uses: actions/checkout@v4

      - name: ⚙️ Node.js 세팅하기
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 필요 프로그램 설치하기
        run: npm install

      - name: 🌐 보이지 않는 크롬 브라우저(Playwright) 설치하기
        run: npx playwright install chromium

      - name: 🚀 크롤러 스크립트 실행하기!
        run: npx tsx scripts/scraper.ts
        env: # 1단계에서 설정한 비밀번호를 여기에 꽂아줍니다.
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}